
# The workflow name - appears in the Github Actions tab
name: Pulse - Daily Summary Bot
# When to run this workflow
on:
# Scheduled run: 2:38 AM UTC = 8:00 AM IST
schedule:
- cron: '30 2 * * *'
# Manual trigger: adds a "Run workflow" button to the Actions tab.
# Use this to test anytime without waiting for the cron.
workflow_dispatch:
# The jobs this workflow runs
jobs:
 run-pulse:
  runs-on: ubuntu-latest
steps:
# Step I: Get your code onto the server
- name: Checkout code
uses: actions/checkout@v4
# official action - clones your repo
# Step 2: Install Python 3.11
- name: Set up Python
uses: actions/setup-python@v5
with:
 python-version: '3.11'
# Step 3: Install the requests Library
- name: Install dependencies
 run: pip install -r requirements.txt
# Step 4: Run your bot
- name: Run Pulse bot
  run: python bot.py
# Step 5: Save the output file so you can download it
- name: Upload summary as artifact
uses: actions/upload-artifact@v4
with:
name: daily-summary
path: daily_summary.txt
